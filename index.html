<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#0d0920">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<title>開運カレンダー</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{--bg:#0d0920;--bg2:#120c28;--card:#180e35;--border:#2a1a55;--gold:#d4a017;--gold-l:#f5c842;--text:#ede8fa;--muted:#7d6aaa;--good:#4ade80;--bad:#f87171;--sp:#a78bfa}
body{font-family:'Hiragino Kaku Gothic ProN','Meiryo','Yu Gothic',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;-webkit-text-size-adjust:100%}
header{background:linear-gradient(135deg,#1a0a3e,#0d0920);padding:13px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:20}
.h-title{font-size:1.05rem;font-weight:800;background:linear-gradient(90deg,var(--gold-l),var(--gold));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.h-sub{font-size:.66rem;color:var(--muted);margin-top:1px}
.tabs{display:flex;background:var(--bg2);border-bottom:1px solid var(--border);position:sticky;top:53px;z-index:19}
.tab{flex:1;padding:10px 3px;border:none;background:transparent;color:var(--muted);cursor:pointer;font-size:.76rem;white-space:nowrap;border-bottom:2px solid transparent;transition:all .2s;font-family:inherit}
.tab.active{color:var(--gold-l);border-bottom-color:var(--gold-l)}
.screen{display:none;padding:14px 13px 90px}.screen.active{display:block}
.wrap{max-width:460px;margin:0 auto}
.card{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:15px;margin-bottom:12px}
.ctitle{font-size:.68rem;color:var(--muted);letter-spacing:.1em;margin-bottom:10px}
.score-card{background:radial-gradient(ellipse at 50% 0%,rgba(212,160,23,.06),transparent 62%),linear-gradient(160deg,#1e0a45 0%,#0d1535 100%);border:1px solid #3d2070;text-align:center;padding:22px 14px 18px}
.sc-date{font-size:.8rem;color:var(--muted);margin-bottom:8px}
.sc-row{display:flex;align-items:center;justify-content:center;gap:18px;margin-bottom:10px}
.sc-num{font-size:4.5rem;font-weight:800;line-height:1;color:var(--gold-l);text-shadow:0 0 24px currentColor}
.sc-right{text-align:left}
.sc-level{font-size:1.5rem;font-weight:700;line-height:1}
.sc-label{font-size:.72rem;color:var(--muted);margin-top:3px}
.sc-bar-bg{background:rgba(255,255,255,.08);border-radius:99px;height:7px;margin:0 16px}
.sc-bar{height:100%;border-radius:99px;transition:width 1s ease}
.badges{display:flex;gap:7px;flex-wrap:wrap;margin-bottom:12px}
.bdg{display:inline-flex;align-items:center;gap:4px;border-radius:20px;padding:4px 11px;font-size:.75rem;font-weight:600}
.bdg-star{background:#1e0f45;border:1px solid #5a3ab0;color:#c4a9ff}
.bdg-good{background:#052d14;border:1px solid #166534;color:#86efac}
.moon-row{display:flex;align-items:center;gap:14px}
.moon-em{font-size:2.2rem}
.moon-name{font-size:.98rem;font-weight:600}
.moon-desc{font-size:.74rem;color:var(--muted);margin-top:2px}
.comp-wrap{display:grid;grid-template-columns:repeat(3,1fr);gap:5px;max-width:260px;margin:0 auto}
.cd{border-radius:9px;padding:4px 3px;text-align:center;border:1.5px solid;aspect-ratio:1;display:flex;flex-direction:column;align-items:center;justify-content:center}
.cd.good{background:rgba(74,222,128,.08);border-color:rgba(74,222,128,.35);color:var(--good)}
.cd.bad{background:rgba(248,113,113,.07);border-color:rgba(248,113,113,.30);color:var(--bad)}
.cd.bad.warn{border-color:rgba(248,113,113,.55)}
.cd.neutral{background:#120826;border-color:#20143f;color:var(--muted)}
.cd.center{background:#0d0920;border-color:var(--border);border-radius:50%;font-size:1rem;box-shadow:inset 0 0 12px rgba(212,160,23,.15)}
.cd-dir{font-size:.65rem;margin-bottom:2px;color:var(--muted)}
.cd-lbl{font-size:.62rem;font-weight:700}
.cd-star{font-size:.58rem;opacity:.75;margin-top:2px}
.act-no{display:inline-flex;align-items:center;justify-content:center;width:20px;height:20px;border-radius:50%;background:rgba(212,160,23,.15);border:1px solid rgba(212,160,23,.4);color:var(--gold-l);font-size:.72rem;font-weight:700}
.act-item{display:flex;gap:9px;padding:9px 0;border-bottom:1px solid #1e1440}
.act-item:last-child{border-bottom:none}
.act-ic{font-size:1rem;flex-shrink:0;margin-top:1px}
.act-txt{font-size:.83rem;line-height:1.55}
.act-item.sp .act-txt{color:#86efac}
.avoid-tag{display:inline-block;background:#2d0a0a;border:1px solid #7f1d1d;border-radius:6px;color:#fca5a5;font-size:.76rem;padding:3px 9px;margin-right:6px;margin-bottom:6px}
.lc-row{display:flex;align-items:center;gap:12px}
.lc-sw{width:42px;height:42px;border-radius:10px;border:1px solid rgba(255,255,255,.1);flex-shrink:0}
.lc-name{font-size:1rem;font-weight:600}
.lc-hint{font-size:.74rem;color:var(--muted);margin-top:2px}
.cal-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
.cal-btn{background:var(--card);border:1px solid var(--border);color:var(--text);border-radius:8px;padding:5px 13px;cursor:pointer;font-size:.88rem;font-family:inherit}
.cal-lbl{font-size:1rem;font-weight:700;color:var(--gold-l)}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:3px}
.cal-dow{text-align:center;font-size:.65rem;color:var(--muted);padding:3px 0}
.cal-day{border-radius:7px;padding:5px 2px;min-height:50px;background:var(--card);border:1px solid var(--border);cursor:pointer;position:relative;min-width:0}
.cal-day.today{border-color:var(--gold);background:#1e1230}
.cal-day.om{opacity:.3}
.cal-num{text-align:center;font-size:.76rem;margin-bottom:3px}
.cal-num.sun{color:#f87171}.cal-num.sat{color:#60a5fa}
.cal-dots{display:flex;gap:2px;justify-content:center;flex-wrap:wrap}
.dot{width:5px;height:5px;border-radius:50%}
.dot.tensha{background:#f5c842}.dot.manbai{background:#4ade80}
.dot.newmoon{background:#60a5fa}.dot.fullmoon{background:#e5e7eb}
.cal-score{height:3px;border-radius:2px;margin:2px 3px 0}
.legend{display:flex;gap:8px 12px;flex-wrap:wrap;margin-top:10px;background:var(--card);border-radius:10px;padding:8px 12px}
.leg{display:flex;align-items:center;gap:4px;font-size:.7rem;color:var(--muted)}
.leg-bar{width:16px;height:3px;border-radius:2px;background:linear-gradient(90deg,#ef4444,#64748b,#3b82f6,#22c55e,#d4a017)}
.s-label{font-size:.78rem;color:var(--muted);margin-bottom:7px}
input[type=date].s-input{width:100%;background:var(--card);border:1px solid var(--border);color:var(--text);border-radius:10px;padding:11px 13px;font-size:.95rem;outline:none;font-family:inherit}
input[type=date].s-input:focus{border-color:var(--gold)}
.s-btn{width:100%;background:linear-gradient(135deg,#4d2d9e,#2a1a55);border:1px solid #6d4dae;color:#ede8fa;border-radius:10px;padding:12px;font-size:.92rem;font-weight:600;cursor:pointer;margin-top:10px;font-family:inherit;transition:all .15s}
.s-btn:active{transform:scale(.98)}
.star-card{background:var(--bg2);border:1px solid var(--border);border-radius:12px;padding:13px;margin-top:11px}
.star-card h3{font-size:1rem;font-weight:700;margin-bottom:5px}
.star-card p{font-size:.78rem;color:var(--muted);line-height:1.65}
.empty{text-align:center;padding:50px 16px;color:var(--muted)}
.empty .ei{font-size:2.8rem;margin-bottom:10px}
.empty p{font-size:.85rem;line-height:1.7}
.empty a{color:var(--gold-l);cursor:pointer}
/* toggle switch */
.tg-row{display:flex;align-items:center;justify-content:space-between;padding:10px 0;border-bottom:1px solid #1e1440}
.tg-row:last-child{border-bottom:none}
.tg-lbl{font-size:.85rem}
.tg-sub{font-size:.68rem;color:var(--muted);margin-top:1px}
.switch{position:relative;display:inline-block;width:44px;height:24px;flex-shrink:0;margin-left:12px}
.switch input{opacity:0;width:0;height:0}
.slider{position:absolute;cursor:pointer;inset:0;background:#241542;border:1px solid var(--border);border-radius:24px;transition:.25s}
.slider:before{content:'';position:absolute;height:18px;width:18px;left:2px;top:2px;background:#7d6aaa;border-radius:50%;transition:.25s}
.switch input:checked+.slider{background:linear-gradient(135deg,#4d2d9e,#2a1a55);border-color:var(--gold)}
.switch input:checked+.slider:before{transform:translateX(20px);background:var(--gold-l)}
/* compatibility */
.p-input{width:100%;background:var(--bg2);border:1px solid var(--border);color:var(--text);border-radius:10px;padding:10px 12px;font-size:.9rem;outline:none;font-family:inherit;margin-bottom:9px}
.p-input:focus{border-color:var(--gold)}
.p-item{display:flex;align-items:center;gap:11px;background:var(--bg2);border:1px solid var(--border);border-radius:11px;padding:11px 13px;margin-top:8px;cursor:pointer;transition:border-color .15s}
.p-item.sel{border-color:var(--gold)}
.p-em{font-size:1.5rem;flex-shrink:0}
.p-name{font-size:.92rem;font-weight:600}
.p-meta{font-size:.71rem;color:var(--muted);margin-top:1px}
.p-del{margin-left:auto;background:#2d0a0a;border:1px solid #7f1d1d;color:#fca5a5;border-radius:8px;padding:6px 11px;font-size:.72rem;cursor:pointer;font-family:inherit;flex-shrink:0}
.cmp-pair{display:flex;align-items:center;justify-content:center;gap:8px;margin:2px 0 14px}
.cmp-person{text-align:center;flex:1;min-width:0}
.cmp-em{font-size:2.4rem;line-height:1}
.cmp-nm{font-size:.82rem;font-weight:700;margin-top:4px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.cmp-star{font-size:.7rem;color:var(--muted);margin-top:1px}
.cmp-vs{font-size:1.3rem;color:var(--gold);flex-shrink:0}
.cmp-type{text-align:center;font-size:1.2rem;font-weight:800;color:var(--gold-l);margin-bottom:4px}
.cmp-score{text-align:center;font-size:1.15rem;letter-spacing:3px;margin-bottom:2px}
.cmp-tlbl{text-align:center;font-size:.7rem;color:var(--muted);margin-bottom:6px}
.cmp-block{margin-top:11px}
.cmp-h{font-size:.76rem;font-weight:700;margin-bottom:4px}
.cmp-h.g{color:var(--good)}.cmp-h.b{color:var(--bad)}
.cmp-p{font-size:.8rem;line-height:1.65;color:var(--text)}
.tori-box{background:var(--bg2);border:1px solid var(--border);border-radius:11px;padding:12px 13px;margin-top:9px}
.tori-line{font-size:.8rem;line-height:1.6;margin-bottom:6px}
.tori-line:last-child{margin-bottom:0}
.tori-k{color:var(--gold-l);font-weight:600}
.strat-box{background:#160a30;border:1px solid #4d2d9e;border-radius:11px;padding:12px 13px;margin-top:9px}
.strat-box .cmp-p{color:#d6c8ff}
/* 暦カード（六曜・祝日・記念日・予定） */
.ky-item{display:flex;gap:10px;padding:9px 0;border-bottom:1px solid #1e1440}
.ky-item:last-child{border-bottom:none}
.ky-ic{font-size:1.05rem;flex-shrink:0;width:22px;text-align:center;margin-top:1px}
.ky-c{flex:1;min-width:0}
.ky-t{font-size:.9rem;font-weight:600}
.ky-d{font-size:.73rem;color:var(--muted);margin-top:2px;line-height:1.55}
.rk-taian{color:var(--gold-l)}
.rk-butsu{color:#a88}
.rk-hol{color:#f87171}
/* カレンダーセル追加要素 */
.cal-day{min-height:60px}
.cal-num.hol{color:#f87171}
.cal-rk{text-align:center;font-size:.56rem;line-height:1;margin:1px 0 2px;color:var(--muted)}
.cal-rk.taian{color:var(--gold-l)}
.cal-rk.butsu{color:#9e7b7b}
.cal-hol{text-align:center;font-size:.5rem;color:#f87171;line-height:1.1;margin-bottom:2px;overflow:hidden;white-space:nowrap;text-overflow:ellipsis}
.cal-pin{position:absolute;top:2px;right:3px;font-size:.52rem;line-height:1}
.cal-ev{font-size:.56rem;line-height:1.25;color:#b8a5e8;background:rgba(167,139,250,.12);border-radius:4px;padding:0 3px;margin:0 2px 2px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.cal-ev-more{font-size:.5rem;line-height:1;color:var(--sp);text-align:right;margin:0 3px 2px}
/* 日詳細ボトムシート */
.sheet-ov{position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:40;opacity:0;pointer-events:none;transition:opacity .2s}
.sheet-ov.show{opacity:1;pointer-events:auto}
.sheet{position:fixed;left:0;right:0;bottom:0;z-index:41;background:var(--bg2);border-top:1px solid var(--border);border-radius:20px 20px 0 0;max-width:460px;margin:0 auto;max-height:84vh;overflow-y:auto;padding:12px 16px 32px;transform:translateY(100%);transition:transform .25s}
.sheet-ov.show .sheet{transform:translateY(0)}
.sheet-grip{width:38px;height:4px;border-radius:2px;background:var(--border);margin:2px auto 12px}
.sheet-hd{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:12px;gap:10px}
.sheet-date{font-size:1.15rem;font-weight:700;color:var(--gold-l)}
.sheet-sub{font-size:.75rem;color:var(--muted);margin-top:3px;line-height:1.5}
.sheet-x{background:var(--card);border:1px solid var(--border);color:var(--text);border-radius:8px;width:30px;height:30px;font-size:1rem;cursor:pointer;flex-shrink:0;font-family:inherit}
.sd-badges{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:6px}
.sd-sec{margin-top:13px}
.sd-h{font-size:.68rem;color:var(--muted);letter-spacing:.08em;margin-bottom:6px}
.sd-line{font-size:.83rem;line-height:1.65}
.sd-score{display:flex;align-items:center;gap:10px}
.sd-scnum{font-size:1.9rem;font-weight:800;line-height:1}
.ev-item{display:flex;align-items:center;gap:8px;background:var(--card);border:1px solid var(--border);border-radius:9px;padding:8px 11px;margin-bottom:6px}
.ev-tx{font-size:.85rem;flex:1;min-width:0;word-break:break-word;line-height:1.45}
.ev-del{background:#2d0a0a;border:1px solid #7f1d1d;color:#fca5a5;border-radius:7px;padding:4px 9px;font-size:.7rem;cursor:pointer;font-family:inherit;flex-shrink:0}
.ev-form{display:flex;gap:7px;margin-top:8px}
.ev-in{flex:1;min-width:0;background:var(--card);border:1px solid var(--border);color:var(--text);border-radius:9px;padding:9px 11px;font-size:.85rem;outline:none;font-family:inherit}
.ev-in:focus{border-color:var(--gold)}
.ev-add{background:linear-gradient(135deg,#4d2d9e,#2a1a55);border:1px solid #6d4dae;color:#ede8fa;border-radius:9px;padding:0 15px;font-size:.85rem;font-weight:600;cursor:pointer;font-family:inherit;flex-shrink:0}
.ev-empty{font-size:.78rem;color:var(--muted);padding:2px 0 4px}
/* 機能A: 不成就日・寅・巳・甲子 */
.dot.fujoju{background:#f87171}
.bdg-bad{background:#2d0a0a;border:1px solid #7f1d1d;color:#fca5a5}
.bdg-gold{background:#2a2005;border:1px solid #6b5410;color:#f5c842}
/* 機能B: 最適日検索 */
.gold-btn{width:100%;background:linear-gradient(135deg,#d4a017,#8a6a0e);border:1px solid var(--gold-l);color:#1a0a3e;border-radius:10px;padding:11px;font-size:.9rem;font-weight:700;cursor:pointer;font-family:inherit;margin-bottom:12px;transition:transform .15s}
.gold-btn:active{transform:scale(.98)}
.chip-row{display:flex;gap:8px;overflow-x:auto;padding:2px 1px 10px;-webkit-overflow-scrolling:touch}
.chip{flex:0 0 auto;background:var(--card);border:1px solid var(--border);color:var(--text);border-radius:20px;padding:8px 14px;font-size:.8rem;cursor:pointer;white-space:nowrap;font-family:inherit;transition:all .15s}
.chip.sel{background:linear-gradient(135deg,#d4a017,#8a6a0e);border-color:var(--gold-l);color:#1a0a3e;font-weight:700}
.best-row{display:flex;align-items:center;gap:11px;background:var(--card);border:1px solid var(--border);border-radius:12px;padding:11px 12px;margin-bottom:8px;cursor:pointer;transition:border-color .15s}
.best-row:active{border-color:var(--gold)}
.best-rank{font-size:1.15rem;font-weight:800;color:var(--gold-l);width:24px;text-align:center;flex-shrink:0}
.best-c{flex:1;min-width:0}
.best-date{font-size:.92rem;font-weight:700}
.best-reason{font-size:.72rem;color:var(--muted);margin-top:2px;line-height:1.45}
.best-badges{display:flex;gap:4px;flex-wrap:wrap;margin-top:5px}
.best-mini{font-size:.62rem;border-radius:10px;padding:1px 7px;font-weight:600;white-space:nowrap}
.best-score{font-size:1.5rem;font-weight:800;line-height:1;flex-shrink:0;text-align:center}
.best-score .best-slbl{font-size:.58rem;font-weight:600;color:var(--muted);display:block;margin-top:2px}
.best-empty{text-align:center;color:var(--muted);font-size:.82rem;line-height:1.7;padding:24px 8px}
</style>
</head>
<body>
<header>
  <div>
    <div class="h-title">✦ 開運カレンダー</div>
    <div class="h-sub" id="hDate"></div>
  </div>
  <span id="hMoon" style="font-size:1.5rem"></span>
</header>
<div class="tabs">
  <button class="tab active" onclick="showTab('today')">✦ 今日</button>
  <button class="tab" onclick="showTab('calendar')">📅 暦</button>
  <button class="tab" id="tabCompat" onclick="showTab('compat')">💞 相性</button>
  <button class="tab" onclick="showTab('settings')">⚙ 設定</button>
</div>

<div id="sc-today" class="screen active"><div class="wrap" id="todayWrap"></div></div>
<div id="sc-calendar" class="screen"><div class="wrap">
  <div class="cal-hdr">
    <button class="cal-btn" onclick="calPrev()">‹</button>
    <span class="cal-lbl" id="calLbl"></span>
    <button class="cal-btn" onclick="calNext()">›</button>
  </div>
  <button class="gold-btn" onclick="openBestDay()">🔍 最適日をさがす</button>
  <div class="cal-grid" id="calGrid"></div>
  <div class="legend">
    <div class="leg"><div class="dot tensha"></div>天赦日</div>
    <div class="leg"><div class="dot manbai"></div>一粒万倍日</div>
    <div class="leg"><div class="dot newmoon"></div>新月</div>
    <div class="leg"><div class="dot fullmoon"></div>満月</div>
    <div class="leg"><div class="dot fujoju"></div>不成就日</div>
    <div class="leg"><span class="cal-ev" style="margin:0 4px 0 0;max-width:44px">予定</span>予定</div>
    <div class="leg"><div class="leg-bar"></div>バーの色＝運気</div>
  </div>
</div></div>
<div id="sc-compat" class="screen"><div class="wrap" id="compatWrap"></div></div>
<div id="sc-settings" class="screen"><div class="wrap" id="settingsWrap"></div></div>

<div class="sheet-ov" id="daySheetOv" onclick="if(event.target===this)closeDayDetail()">
  <div class="sheet" id="daySheet"></div>
</div>
<div class="sheet-ov" id="bestSheetOv" onclick="if(event.target===this)closeBestDay()">
  <div class="sheet" id="bestSheet"></div>
</div>

<script>
// ─── DATA ────────────────────────────────────────────────────────────────────
const STARS = [null,
  {name:'一白水星',elem:'水',emoji:'💧',color:'#60a5fa',dirIdx:0,
   lucky:['白','黒','紺'],
   acts:['水を飲む・入浴してリフレッシュ','日記や記録をつける','信頼できる人と対話する'],
   avoid:['大きな契約・重要な決断','孤立した行動'],
   torisetsu:{likes:'悩みにそっと寄り添い、本音をじっくり聞いてもらうこと',ng:'感情を無視した強引な決めつけや、打ち明けた秘密を軽々しく他人に漏らすこと',approach:'一対一で時間をかけ、粘り強く信頼を積み重ねて本音を引き出す'}},
  {name:'二黒土星',elem:'土',emoji:'🌾',color:'#ca8a04',dirIdx:5,
   lucky:['黄','茶','ベージュ'],

// 年盤中宮 (reference: 2024 = 三碧木星 = 3)
function getYearStar(year) {
  const off = ((year - 2024) % 9 + 9) % 9;
  return ((2 - off + 90) % 9) + 1;
}

// 本命星 from birth date (節分 Feb4 adjustment)
function getBirthStar(y, m, d) {
  const eff = (m === 1 || (m === 2 && d < 4)) ? y - 1 : y;
  return getYearStar(eff);
}

// Returns {branch:0-11 (子=0..亥=11), effYear for year star}
// 太陽黄経ベースの正確な節月判定（旧暦計算用の longitudeSun 等を再利用）
const _monthInfoCache = {};
function getMonthInfo(date) {
  const y = date.getFullYear(), m = date.getMonth()+1, d = date.getDate();
  const key = y*10000 + m*100 + d;
  if (_monthInfoCache[key]) return _monthInfoCache[key];
  // その日の「翌日0時JST」時点の太陽黄経 λ（節切り: 節気当日はその日中に節入り→新節月に属する）
  const jdn = rkJdn(y, m, d);
  const nextMidnightUT = jdn + 0.125; // 翌日0時JST（= 対象日24:00 JST）
  const lambda = longitudeSun(rkTof(nextMidnightUT, y));
  // 立春=315°で寅月(2)開始、345°で卯月(3)、15°で辰月(4)…
  const branch = (Math.floor(((lambda - 315 + 360) % 360) / 30) + 2) % 12;
  // 年盤用の年: 1月は常に前年扱い、2月は立春(315°)前のみ前年
  const effYear = (m <= 2 && lambda < 315) ? y - 1 : y;
  const res = { branch, effYear };
  _monthInfoCache[key] = res;
  return res;
}

// 月盤中宮
function getMonthStar(date) {
  const { branch, effYear } = getMonthInfo(date);
  const ys = getYearStar(effYear);
  // 寅月(branch=2) base star per year star: [8,2,5,8,2,5,8,2,5]
  const bases = [8,2,5,8,2,5,8,2,5];
  const base = bases[ys - 1];
  // offset from 寅月: 寅=2→0, 卯=3→1, ..., 丑=1→11
  const off = (branch - 2 + 12) % 12;
  return ((base - off - 1 + 90) % 9) + 1;
}

// 日の干支 index 0-59 (甲子=0 ... 癸亥=59)
// Reference: Jan 1, 2000 = 戊午 = index 54
function getDayKanshi(date) {
  const ref = new Date(2000, 0, 1);
  // 時刻を持つDate（new Date()等）でも正午以降に翌日へ丸められないよう日付に正規化
  const d0 = new Date(date.getFullYear(), date.getMonth(), date.getDate());
  const days = Math.round((d0 - ref) / 86400000);
  return ((days + 54) % 60 + 60) % 60;
}

// 日盤中宮 (approximate — day star starts at month star on 節気 day, decrements daily)
function getDayStar(date) {
  const ms = getMonthStar(date);
  const m = date.getMonth()+1, d = date.getDate();
  const cuts = [6,4,6,5,6,6,7,7,8,8,7,7];
  const cut = cuts[m-1];
  let daysIn;
  if (d >= cut) {
    daysIn = d - cut;
  } else {
    const pm = m === 1 ? 12 : m - 1;
    const prevCut = cuts[pm-1];
    const daysInPrev = new Date(date.getFullYear(), m-1, 0).getDate();
    daysIn = (daysInPrev - prevCut) + d;
  }
  return ((ms - daysIn - 1 + 90) % 9) + 1;
}

// Moon phase (0=new moon, ~14.77=full moon, cycle=29.53 days)
function getMoonPhase(date) {
  const y=date.getFullYear(), m=date.getMonth()+1, d=date.getDate();
  const a=Math.floor((14-m)/12), yy=y+4800-a, mm=m+12*a-3;
  const jd=d+Math.floor((153*mm+2)/5)+365*yy+Math.floor(yy/4)-Math.floor(yy/100)+Math.floor(yy/400)-32045;
  const ds = jd - 2451549.275; // ref new moon Jan 6, 2000
  const cyc = 29.53058867;
  return ((ds % cyc) + cyc) % cyc;
}

function moonInfo(phase) {

  if (f < 0.03 || f > 0.97) return { name:'新月', emoji:'🌑', boost:1.4, desc:'新しいスタートの日' };

// Board: for a given center star, what star sits at each direction?
function getBoard(centerStar) {
  return DIR_TO_STAR_STD.map(base => ((base + centerStar - 6 + 90) % 9) + 1);
}

function gogyoRel(birthStar, otherStar) {
  const be = STARS[birthStar].elem, oe = STARS[otherStar].elem;
  if (be === oe) return 'same';
  if (GENERATES[oe] === be || GENERATES[be] === oe) return 'good';
  return 'bad';
}

function getLuckyDirs(birthStar, centerStar) {
  const board = getBoard(centerStar);
  return DIRS.map((dir, i) => {
    const s = board[i];
    let type, lbl;
    if (centerStar !== 5 && s === 5)               { type='bad';     lbl='五黄殺'; }
    else if (centerStar !== 5 && board[(i+4)%8]===5) { type='bad';   lbl='暗剣殺'; }
    else if (s === birthStar)                        { type='good';   lbl='本命位'; }
    else {
      const r = gogyoRel(birthStar, s);
      type = r==='good' ? 'good' : r==='bad' ? 'bad' : 'neutral';
      lbl  = type==='good' ? '吉' : type==='bad' ? '凶' : '';
    }
    return { dir, i, star: s, type, lbl };
  });
}

function getScore(date, birthStar) {
  const ds = getDayStar(date), ms = getMonthStar(date);
  let sc = 50;
  const dr = gogyoRel(birthStar, ds);
  if (ds === birthStar) sc += 25;
  else if (dr === 'good') sc += 18;
  else if (dr === 'bad')  sc -= 12;
  const mr = gogyoRel(birthStar, ms);
  if (mr === 'good') sc += 10; else if (mr === 'bad') sc -= 8;
  if (isTenshanichi(date))    sc += 20;
  if (isIchiryuManbaibi(date)) sc += 10;
  sc = Math.floor(sc * moonInfo(getMoonPhase(date)).boost);
  return Math.min(100, Math.max(8, sc));
}

function hlNthMonday(y,m,nth){ const first=new Date(y,m-1,1).getDay(); return 1+((8-first)%7)+(nth-1)*7; }

const _holCache = {};
function holidaysOfYear(y){
  if (_holCache[y]) return _holCache[y];
  const h = {}; const set=(m,d,n)=>{ h[m+'-'+d]=n; };
  set(1,1,'元日'); set(2,11,'建国記念の日'); set(2,23,'天皇誕生日'); set(4,29,'昭和の日');
  set(5,3,'憲法記念日'); set(5,4,'みどりの日'); set(5,5,'こどもの日'); set(8,11,'山の日');
  set(11,3,'文化の日'); set(11,23,'勤労感謝の日');
  set(1,hlNthMonday(y,1,2),'成人の日'); set(7,hlNthMonday(y,7,3),'海の日');
  set(9,hlNthMonday(y,9,3),'敬老の日'); set(10,hlNthMonday(y,10,2),'スポーツの日');
  set(3,hlSpring(y),'春分の日'); set(9,hlAutumn(y),'秋分の日');
  const isH=(mm,dd)=>!!h[mm+'-'+dd];
  // 国民の休日：祝日に挟まれた平日（日曜以外）
  const extra=[];
  for(let m=1;m<=12;m++){ const dim=new Date(y,m,0).getDate();
    for(let d=1;d<=dim;d++){ const dt=new Date(y,m-1,d);
      if(isH(m,d)||dt.getDay()===0) continue;
      const pv=new Date(y,m-1,d-1), nx=new Date(y,m-1,d+1);
      if(isH(pv.getMonth()+1,pv.getDate())&&isH(nx.getMonth()+1,nx.getDate())) extra.push([m,d]);
    }}
  for(const [m,d] of extra) set(m,d,'国民の休日');
  // 振替休日：日曜が祝日→次の平日
  const subs=[];
  for(const k of Object.keys(h)){ const [m,d]=k.split('-').map(Number);
    if(new Date(y,m-1,d).getDay()!==0) continue;
    let cur=new Date(y,m-1,d+1);
    while(isH(cur.getMonth()+1,cur.getDate())) cur.setDate(cur.getDate()+1);
    subs.push([cur.getMonth()+1,cur.getDate()]);
  }
  for(const [m,d] of subs) if(!h[m+'-'+d]) set(m,d,'振替休日');
  _holCache[y]=h; return h;
}
function holidayName(y,m,d){ return holidaysOfYear(y)[m+'-'+d] || null; }

function annivFor(m, d){ const list=(ANNIV[pad2(m)+'-'+pad2(d)]||[]).slice(); if(d===29) list.push('肉の日'); return list; }

// ─── 予定・メモ（書き込みカレンダー） ────────────────────────────────────────
function dkey(dt){ return dt.getFullYear()+'-'+pad2(dt.getMonth()+1)+'-'+pad2(dt.getDate()); }
function loadEvents(){ try{ const s=localStorage.getItem('kaiun_events'); if(s) return JSON.parse(s); }catch(e){} return {}; }
function saveEvents(o){ localStorage.setItem('kaiun_events', JSON.stringify(o)); }
function eventsFor(key){ const o=loadEvents(); return o[key]||[]; }
function addEventFor(key, text){ const o=loadEvents(); if(!o[key]) o[key]=[];
  o[key].push({ id:'e'+Date.now()+Math.floor(Math.random()*1000), text }); saveEvents(o); }
function deleteEventFor(key, id){ const o=loadEvents(); if(o[key]){ o[key]=o[key].filter(e=>e.id!==id);
  if(!o[key].length) delete o[key]; saveEvents(o); } }

// ─── XSS ESCAPE ──────────────────────────────────────────────────────────────
function esc(s){
  return String(s).replace(/[&<>"']/g, c =>
    ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

// ─── DISPLAY PREFS (表示カスタマイズ) ────────────────────────────────────────
const PREF_DEFAULTS = { koyomi:true, moon:true, dir:true, acts:true, avoid:true, color:true, compatTab:false };
function loadPrefs() {
  const p = Object.assign({}, PREF_DEFAULTS);
  try { const s=localStorage.getItem('kaiun_prefs'); if(s) Object.assign(p, JSON.parse(s)); } catch(e) {}
  return p;
}
function savePrefs(p) {
  localStorage.setItem('kaiun_prefs', JSON.stringify(p));
}
function togglePref(key, val) {
  const p = loadPrefs(); p[key] = val; savePrefs(p);
  if (key === 'compatTab') {
    applyTabPrefs();
    // 相性タブをOFFにした瞬間、相性画面を表示中なら今日画面へ退避
    if (!val && document.getElementById('sc-compat').classList.contains('active')) {
      showTab('today');

  }
}

// ─── COMPATIBILITY LOGIC ─────────────────────────────────────────────────────
// 自分の本命星→相手の本命星の五行方向性から相性を判定
function compatInfo(myStar, otherStar) {
  const me = STARS[myStar].elem, oe = STARS[otherStar].elem;
  let type, label, score, good, bad, strategy;
  if (me === oe) {
    type='hiwa'; label='似た者同士'; score=4;
    good='価値観やペースが近く、言葉にしなくても通じ合いやすい間柄。同じ強みを持つため、力を合わせれば大きな成果を生めます。';
    bad='似ているぶん弱点も同じで、同族嫌悪や張り合いに発展しがち。役割やこだわりが重なると衝突します。';
    strategy='あえて役割を分担し、お互いの領分を尊重すると安定します。相手を「もう一人の自分」と思って、先に譲る余裕を持ちましょう。';
  } else if (GENERATES[me] === oe) {
    type='give'; label='尽くし甲斐がある'; score=4;
    good='あなたが相手にエネルギーを与える関係。面倒を見たり育てたりする立場で、感謝されやすく頼りにされます。';
    bad='与えすぎて消耗したり、相手が甘えて依存しがち。見返りを期待すると不満が溜まりやすくなります。';
    strategy='与える量に線引きをし、相手の自立を促す関わり方を。尽くしたぶんは、言葉で相手から返してもらう工夫をしましょう。';
  } else if (GENERATES[oe] === me) {
    type='receive'; label='支えられる'; score=5;
    good='相手があなたを生かし支えてくれる、最良の相性の一つ。一緒にいると自然と運気や気力が高まります。';
    bad='相手に甘えすぎたり、恩を当たり前に感じると関係が細ります。受け取るばかりでは相手も疲れてしまいます。';
    strategy='素直に頼りつつ、感謝をこまめに言葉で返すこと。相手の負担に気を配れば、長く続く良縁になります。';
  } else if (CONTROLS[me] === oe) {
    type='dominate'; label='主導権は自分'; score=2;
    good='あなたが場をコントロールしやすく、主導権を握れる関係。決断や交渉ではあなたが優位に立てます。';
    bad='相手が萎縮・我慢しやすく、知らぬ間にストレスを与えがち。押しすぎると反発や離反を招きます。';
    strategy='勝ちすぎないよう手加減し、相手の意見を先に立てること。命令口調を避け、選択肢を委ねると関係が保てます。';
  } else { // CONTROLS[oe] === me
    type='dominated'; label='手強い相手'; score=1;
    const br = generatorOf(oe); // 相手の五行を生む要素（橋渡し）
    good='相手から刺激や試練を受け、成長のきっかけをもらえる関係。乗り越えれば大きな信頼へと変わります。';
    bad='最も注意が必要な相性。真正面からぶつかると押し切られ、プレッシャーやストレスを感じやすい間柄です。';
    strategy=`相手のペースに正面からぶつからず、${br}の要素を仲介にしましょう。相手の${oe}性を生む「${br}性の話題」や「${br}性の人」を間に立てると、角を立てずに橋渡しできます。`;
  }
  if (myStar === otherStar) score = Math.min(5, score + 1); // 本命星が同一なら補正
  return { type, label, score, good, bad, strategy };
}

// ─── RENDER CALENDAR ─────────────────────────────────────────────────────────
function renderCalendar() {
  document.getElementById('calLbl').textContent = `${calYear}年 ${calMonth}月`;
  const grid = document.getElementById('calGrid');
  const bs = birthDate ? getBirthStar(birthDate.y, birthDate.m, birthDate.d) : null;
  const dows = ['日','月','火','水','木','金','土'];
  let html = dows.map((d,i) =>
    `<div class="cal-dow" style="${i===0?'color:#f87171':i===6?'color:#60a5fa':''}">${d}</div>`
  ).join('');

  const first = new Date(calYear, calMonth-1, 1);
  const last  = new Date(calYear, calMonth,   0);
  const today = new Date(); today.setHours(0,0,0,0);
  const startDow = first.getDay();

  // Leading blank days
  for (let i = 0; i < startDow; i++) {
    const d = new Date(calYear, calMonth-1, -startDow+i+1);
    html += `<div class="cal-day om"><div class="cal-num">${d.getDate()}</div></div>`;
  }

  for (let d = 1; d <= last.getDate(); d++) {
    const dt = new Date(calYear, calMonth-1, d);
    const isToday = dt.getTime() === today.getTime();
    const dow = dt.getDay();
    const numCls = dow===0?'sun':dow===6?'sat':'';
    const tensha = isTenshanichi(dt);
    const manbai = isIchiryuManbaibi(dt);
    const phase  = getMoonPhase(dt);
    const pf = phase / 29.53058867;
    const isNew  = pf < 0.03 || pf > 0.97;
    const isFull = pf > 0.47 && pf < 0.53;
    const sc  = bs ? getScore(dt, bs) : null;
    const sl  = sc  ? scoreLevel(sc)  : null;
    const rk  = getRokuyo(calYear, calMonth, d);
    const hol = holidayName(calYear, calMonth, d);
    const ev = eventsFor(dkey(dt));

    const fujoju = isFujoju(calYear, calMonth, d);
    let dots = '';
    if (tensha) dots += '<div class="dot tensha"></div>';
    if (manbai) dots += '<div class="dot manbai"></div>';
    if (isNew)  dots += '<div class="dot newmoon"></div>';
    if (isFull) dots += '<div class="dot fullmoon"></div>';
    if (fujoju) dots += '<div class="dot fujoju"></div>';

    html += `<div class="cal-day${isToday?' today':''}" onclick="openDayDetail(${calYear},${calMonth},${d})">
      <div class="cal-num ${numCls}${hol?' hol':''}">${d}</div>
      <div class="cal-rk ${rokuyoCalCls(rk.idx)}">${ROKUYO[rk.idx]}</div>
      ${hol ? `<div class="cal-hol">${esc(hol)}</div>` : ''}
      ${ev.length ? `<div class="cal-ev">${esc(ev[0].text)}</div>${ev.length>1?`<div class="cal-ev-more">+${ev.length-1}</div>`:''}` : ''}
      <div class="cal-dots">${dots}</div>
      ${sl ? `<div class="cal-score" style="width:${sc}%;background:${sl.bar}"></div>` : ''}
    </div>`;
  }
  grid.innerHTML = html;
}

// ─── 日詳細ボトムシート ──────────────────────────────────────────────────────

  detailKey = y + '-' + pad2(m) + '-' + pad2(d);
  renderDayDetail();
  document.getElementById('daySheetOv').classList.add('show');
}
function closeDayDetail() {
  document.getElementById('daySheetOv').classList.remove('show');
  detailKey = null;
}
function renderDayDetail() {
  if (!detailKey) return;
  const [y, m, d] = detailKey.split('-').map(Number);
  const dt = new Date(y, m-1, d);
  const ks = getDayKanshi(dt);
  const rk = getRokuyo(y, m, d);
  const hol = holidayName(y, m, d);

  const tensha = isTenshanichi(dt), manbai = isIchiryuManbaibi(dt);
  const fujoju = isFujoju(y, m, d), tora = isToraDay(dt), mi = isMiDay(dt), kinoe = isKinoeneDay(dt);
  const phase = getMoonPhase(dt), pf = phase / 29.53058867;
  const isNew = pf < 0.03 || pf > 0.97, isFull = pf > 0.47 && pf < 0.53;
  const bs = birthDate ? getBirthStar(birthDate.y, birthDate.m, birthDate.d) : null;

  const badges = [];
  if (hol)    badges.push(`<span class="bdg bdg-good">🎌 ${esc(hol)}</span>`);
  if (tensha) badges.push('<span class="bdg bdg-good">☀️ 天赦日</span>');
  if (manbai) badges.push('<span class="bdg bdg-good">🌱 一粒万倍日</span>');
  if (kinoe)  badges.push('<span class="bdg bdg-gold">✨ 甲子の日</span>');
  if (tora)   badges.push('<span class="bdg bdg-gold">🐯 寅の日</span>');
  if (mi)     badges.push('<span class="bdg bdg-gold">🐍 巳の日</span>');
  if (isNew)  badges.push('<span class="bdg bdg-star">🌑 新月</span>');
  if (isFull) badges.push('<span class="bdg bdg-star">🌕 満月</span>');
  if (fujoju) badges.push('<span class="bdg bdg-bad">⚠ 不成就日</span>');

  let scoreHTML = '';
  if (bs) {
    const sc = getScore(dt, bs), sl = scoreLevel(sc);
    scoreHTML = `<div class="sd-sec"><div class="sd-h">運気スコア</div>
      <div class="sd-score"><div class="sd-scnum" style="color:${sl.color}">${sc}</div>
        <div><div style="font-size:1rem;font-weight:700;color:${sl.color}">${sl.lv}</div>
        <div style="font-size:.72rem;color:var(--muted)">${STARS[bs].name}</div></div></div></div>`;
  }

  const ev = eventsFor(detailKey);

// ─── 機能B: イベント最適日検索 ────────────────────────────────────────────────
const BEST_PURPOSES = [
  { key:'wedding',  label:'入籍・結婚' },
  { key:'business', label:'開業・仕事始め' },
  { key:'wallet',   label:'財布の新調' },
  { key:'lottery',  label:'宝くじ購入' },
  { key:'move',     label:'引っ越し' },
  { key:'salon',    label:'美容院' },
  { key:'date',     label:'告白・デート' },
  { key:'shrine',   label:'神社参拝' },
];
let bestPurpose = null;

// 1日分のスコアと該当バッジ・理由を算出
function scoreBestDay(dt, purposeKey, birthStar) {
  const y = dt.getFullYear(), m = dt.getMonth()+1, d = dt.getDate();
  let sc = birthStar ? getScore(dt, birthStar) : 50;
  const tensha = isTenshanichi(dt), manbai = isIchiryuManbaibi(dt);
  const kinoe = isKinoeneDay(dt), tora = isToraDay(dt), mi = isMiDay(dt);
  const fujoju = isFujoju(y, m, d);
  const rk = getRokuyo(y, m, d).idx; // 大安0 赤口1 先勝2 友引3 先負4 仏滅5
  // 共通ボーナス
  if (tensha) sc += 30;
  if (manbai) sc += 15;
  if (kinoe)  sc += 8;
  if (rk === 0) sc += 10; else if (rk === 3) sc += 5; else if (rk === 2) sc += 3;
  else if (rk === 1) sc -= 5; else if (rk === 5) sc -= 15;
  if (fujoju) sc -= 40; // 不成就日は吉日が重なっても上位に来ないよう強めに減点
  // 目的別ボーナス
  if (purposeKey === 'wallet' || purposeKey === 'lottery') {
    if (tora) sc += 15;
    if (mi)   sc += 12;
  }
  if (purposeKey === 'wedding' || purposeKey === 'date') {
    if (rk === 3) sc += 5; // 友引にさらに
  }
  if (purposeKey === 'shrine') {
    if (kinoe) sc += 5; // 甲子にさらに
  }
  // バッジ
  const badges = [];
  if (tensha) badges.push('<span class="best-mini bdg-good">☀️天赦</span>');
  if (manbai) badges.push('<span class="best-mini bdg-good">🌱一粒</span>');
  if (rk === 0) badges.push('<span class="best-mini bdg-gold">大安</span>');
  if (tora)   badges.push('<span class="best-mini bdg-gold">🐯寅</span>');
  if (mi)     badges.push('<span class="best-mini bdg-gold">🐍巳</span>');
  if (kinoe)  badges.push('<span class="best-mini bdg-gold">✨甲子</span>');
  if (fujoju) badges.push('<span class="best-mini bdg-bad">⚠不成就</span>');
  // ワンライン理由
  const pos = [];
  if (tensha) pos.push('天赦日');
  if (manbai) pos.push('一粒万倍日');
  if (rk === 0) pos.push('大安');
  else if (rk === 3) pos.push('友引');
  if ((purposeKey === 'wallet' || purposeKey === 'lottery') && tora) pos.push('寅の日');
  if ((purposeKey === 'wallet' || purposeKey === 'lottery') && mi) pos.push('巳の日');
  if (kinoe) pos.push('甲子');
  let reason = pos.length ? pos.join('・') + 'の好日' : '総合運の高い日';
  if (fujoju) reason += '（ただし不成就日）';
  return { sc: Math.round(sc), badges, reason, fujoju };
}

// 起点から90日間を走査し上位5日を返す（同点は早い日付優先）
function computeBestDays(purposeKey, startDate) {
  const bs = birthDate ? getBirthStar(birthDate.y, birthDate.m, birthDate.d) : null;
  const s = startDate || new Date();
  const start = new Date(s.getFullYear(), s.getMonth(), s.getDate());
  const out = [];
  for (let i = 0; i < 90; i++) {
    const dt = new Date(start.getFullYear(), start.getMonth(), start.getDate() + i);
    const r = scoreBestDay(dt, purposeKey, bs);
    out.push({ dt, i, ...r });
  }
  out.sort((a, b) => b.sc - a.sc || a.i - b.i);
  return out.slice(0, 5);
}

function openBestDay() {
  bestPurpose = null;
  renderBestDay();
  document.getElementById('bestSheetOv').classList.add('show');
}
function closeBestDay() {
  document.getElementById('bestSheetOv').classList.remove('show');

function renderBestDay() {
  const chips = BEST_PURPOSES.map(p =>
    `<button class="chip${bestPurpose === p.key ? ' sel' : ''}" onclick="selectPurpose('${p.key}')">${p.label}</button>`
  ).join('');

  let body;
  if (!bestPurpose) {
    body = `<div class="best-empty">目的を選ぶと、今日から90日間で<br>もっとも縁起のよい日 上位5日を提案します。</div>`;
  } else {
    const list = computeBestDays(bestPurpose);
    const label = (BEST_PURPOSES.find(p => p.key === bestPurpose) || {}).label || '';
    body = `<div class="sd-h" style="margin-bottom:8px">「${label}」に良い日 ベスト5（今日から90日）</div>` +
      list.map((r, idx) => {
        const y = r.dt.getFullYear(), m = r.dt.getMonth()+1, d = r.dt.getDate();
        const sl = scoreLevel(Math.min(100, Math.max(0, r.sc)));
        return `<div class="best-row" onclick="selectBestDay(${y},${m},${d})">

          </div>
          <div class="best-score" style="color:${sl.color}">${r.sc}<span class="best-slbl">点</span></div>
        </div>`;
      }).join('');
  }

  document.getElementById('bestSheet').innerHTML = `

      <div>

      </div>

    ${body}`;
}

// ─── 機能D: データの書き出し・読み込み ───────────────────────────────────────
const BACKUP_KEYS = ['kaiun_v1','kaiun_events','kaiun_partners','kaiun_prefs'];
function exportData() {
  const data = {};
  BACKUP_KEYS.forEach(k => {
    const v = localStorage.getItem(k);
    if (v !== null) { try { data[k] = JSON.parse(v); } catch(e) { data[k] = v; } }
  });
  const payload = { version:1, exportedAt:new Date().toISOString(), data };
  const blob = new Blob([JSON.stringify(payload, null, 2)], { type:'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = 'kaiun-backup.json';
  document.body.appendChild(a); a.click(); document.body.removeChild(a);
  URL.revokeObjectURL(url);
}
function importData(input) {
  const file = input.files && input.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = () => {
    let obj;
    try { obj = JSON.parse(reader.result); }
    catch(e) { alert('読み込みに失敗しました：不正なJSONファイルです'); input.value = ''; return; }
    if (!obj || typeof obj !== 'object' || obj.version === undefined || !obj.data || typeof obj.data !== 'object') {
      alert('読み込みに失敗しました：対応していない形式のファイルです'); input.value = ''; return;
    }
    if (!confirm('現在のデータを上書きします。よろしいですか？')) { input.value = ''; return; }
    BACKUP_KEYS.forEach(k => {
      if (k in obj.data) {
        const val = obj.data[k];
        localStorage.setItem(k, typeof val === 'string' ? val : JSON.stringify(val));
      }
    });
    // 状態と全画面を再描画
    loadStorage();
    selectedPartnerId = null;
    applyTabPrefs();
    renderHeader();
    renderToday();
    renderCalendar();
    renderCompat();
    renderSettings();
    input.value = '';
    alert('データを読み込みました');
  };
  reader.onerror = () => { alert('ファイルの読み込みに失敗しました'); input.value = ''; };
  reader.readAsText(file);
}
